<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case page</title>
    <!-- Фавиконки -->
  <link rel="icon" type="image/svg+xml" href="./assets/favicon/favicon.svg" />
  <link rel="shortcut icon" href="./assets/favicon/favicon.ico" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
  <link rel="stylesheet" href="./styles/style.css" />

  <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js" defer></script>
</head>
<body>
  <header id="header" class="header"></header>
  <main>
    <!-- Секция Hero -->
    <section class="hero-ep section-common" id="hero"></section>
    <!-- Секция Gallery -->
    <section class="gallery-slider gallery-slider--ep section-common" id="gallery-slider">
      <div class="gallery-slider__wrapper">
        <div class="slider-track__horizontal" id="slider-track__horizontal">
          <div class="slide-top"><img src="./assets/images/gallery/gallery-1.webp" alt="Gallery image" /></div>
          <div class="slide-top"><img src="./assets/images/gallery/gallery-3.webp" alt="Gallery image" /></div>
          <div class="slide-top"><img src="./assets/images/gallery/gallery-2.webp" alt="Gallery image" /></div>
          <div class="slide-top"><img src="./assets/images/gallery/gallery-3.webp" alt="Gallery image" /></div>
          <div class="slide-top"><img src="./assets/images/gallery/gallery-2.webp" alt="Gallery image" /></div>
          <div class="slide-top"><img src="./assets/images/gallery/gallery-3.webp" alt="Gallery image" /></div>
        </div>
        <div class="slider-track__vertical" id="slider-track__vertical">
          <div class="slide-bottom"><img src="./assets/images/gallery/gallery-1.webp" alt="Gallery image" /></div>
          <div class="slide-bottom"><img src="./assets/images/gallery/gallery-4.webp" alt="Gallery image" /></div>
          <div class="slide-bottom"><img src="./assets/images/gallery/gallery-1.webp" alt="Gallery image" /></div>
          <div class="slide-bottom"><img src="./assets/images/gallery/gallery-4.webp" alt="Gallery image" /></div>
          <div class="slide-bottom"><img src="./assets/images/gallery/gallery-1.webp" alt="Gallery image" /></div>
          <div class="slide-bottom"><img src="./assets/images/gallery/gallery-4.webp" alt="Gallery image" /></div>
        </div>
      </div>
    </section>
    <!-- Секция Experiences -->
    <section class="experience section-common" id="experience"></section>
    <!-- Секция Testimonials -->
    <section class="testimonials section-decorated-light section-decorated-dark" id="testimonials"></section>
    <!-- Секция Format -->
    <section class="persons format section-common" id="format"></section>
    <!-- Секция CTA -->
    <section class="cta cta--event-page decorated-dark-cta decorated-light-cta" id="cta" style="background-image: url('./assets/images/main/cta.webp');"></section>
    <!-- Секция Form -->
    <section class="contact-form section-common" id="contact-form">
      <div class="container">
        <h2 class="contact-form__title">Let's talk!</h2>
          <form class="contact-form__wrapper" action="#" method="post">
            <div class="contact-form__content">
              <div class="contact-form__info">
                <p class="contact-form__text text-bottom">Feel free to ask your question or make a request directly. Nataly or Mark will contact you within one business day.</p>
                <p class="contact-form__text">Prefer to call? Please do!</p>
                <p class="contact-form__text">Our number is <a class="contact-form__phone" href="https://wa.me/31612365246" target="_blank">+31 6 123 65 246</a></p>
              </div>
              </div>
              <div class="contact-form__fields">
                <input class="contact-form__input" type="text" name="name" placeholder="Name" required>
                <input class="contact-form__input" type="tel" name="phone" placeholder="Phone number" required>
                <input class="contact-form__input" type="text" name="company" placeholder="Company" required>
                <input class="contact-form__input" type="email" name="email" placeholder="Email" required>
              </div>
              <textarea class="contact-form__textarea" name="message" placeholder="Text of your request" required></textarea>
              <div class="contact-form__actions">
                <button class="btn btn-secondary contact-form__btn btn--orange" type="submit">Answer me!</button>
                <div class="checkbox">
                    <input type="checkbox" id="agree" required>
                    <label for="agree">By subscribing, you agree to our <a href="/privacy-policy.html" target="_blank">Privacy Policy</a></label>
                </div>
              </div>
              <div class="contact-form__image-wrapper">
                <img class="contact-form__image" src="./assets/images/main/contact.jpg" alt="Nataly and Mark">
              </div>
          </form>
      </div>
    </section>
  </main>
  <footer class="footer section-common section-decorated-light"></footer>
  
  <script type="module" src="./js/main.js"></script>
</body>
</html>
