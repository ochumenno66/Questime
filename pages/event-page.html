<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Page</title>
    <!-- Фавиконки -->
    <link rel="icon" type="image/svg+xml" href="../assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="../assets/favicon/favicon.ico" />

    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <header id="header" class="header decorated-dark-header">
        <img src="../assets/icons/logo.svg" alt="">
    </header>
    <main>
      <!-- Секция Hero -->
      <section class="hero_ep section-common" id="hero">
        <h1>The Great Silent Era </h1>
      </section>
      <!-- Секция Gallery -->
      <section class="gallery section-common" id="gallery">
        <h2 class="text-align">GALLERY</h2>
      </section>
      <!-- Секция Experience -->
      <section class="experience section-common" id="experience">
        <h2 class="text-align">What your team gains:</h2>
      </section>
      <!-- Секция Route -->
      <section class="route section-common" id="route">
        <h2 class="text-align">Route</h2>
      </section>
      <!-- Секция Persons -->
      <section class="persons section-common" id="persons">
        <h4 class="text-align">Persons</h4>
      </section>
      <!-- Секция Testimonials -->
      <section class="testimonials section-decorated-light section-decorated-dark" id="testimonials"></section>
      <!-- Секция Format -->
      <section class="format section-common" id="format">
        <h4 class="text-align">Format</h4>
      </section>
      <!-- Секция Benefits -->
      <section class="benefits section-common" id="benefits">
        <h2 class="text-align">WHY us?</h2>
      </section>
      <!-- Секция quote как CTA -->
      <section class="quote-tb section-common section-decorated-light section-decorated-dark" id="quote"></section>
      <!-- Секция Quests -->
      <section class="quests section-special" id="quests">
        <h2 class="text-align">You may also like</h2>
      </section>
      <!-- Секция Form -->
      <section class="form section-common" id="form"></section>
    </main>
    <footer class="footer section-common section-decorated-light"></footer>

    <script type="module" src="../js/main.js"></script>
</body>
</html>
