<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Questime</title>
    <!-- Фавиконки -->
    <link rel="icon" type="image/svg+xml" href="../assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="../assets/favicon/favicon.ico" />

    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body>
    <header id="header" class="header"></header>
    <main>
      <!-- Секция Hero -->
      <section class="hero section-decorated-dark" id="hero">
        <h1>WELCOME TO QUESTIME</h1>
      </section>
      <!-- Секция Quests -->
      <section class="quests section-special" id="quests">
        <h2 class="text-align">Explore our unique quests</h2>
      </section>
      <!-- Секция Services -->
      <section class="services section-decorated-light section-decorated-dark" id="services"></section>
      <!-- Секция About -->
      <section class="about section-common" id="about">
        <h2 class="text-align">WHO WE ARE</h2>
      </section>
      <!-- Секция Stats -->
      <section class="stats decorated-dark-stats decorated-light-stats" id="stats"></section>
      <!-- Секция Benefits -->
      <section class="benefits section-common" id="benefits">
        <h2 class="text-align">WHY us?</h2>
      </section>
      <!-- Секция CTA -->
      <section class="cta decorated-dark-cta decorated-light-cta" id="cta">
        <div class="container">
          <div class="cta__inner">
            <h2 class="cta__title">
              <span class="cta__title-orange">City turns</span><span class="cta__title-white"> into a </span><span class="cta__title-orange">gameboard.</span><br>
              <span class="cta__title-white">Are you ready to play?</span>
            </h2>
            <p class="cta__desc">Gamified adventures in the heart of the Netherlands</p>
            <a href="#" class="btn btn-secondary cta__btn" download>Download Our Presentation</a>
          </div>
        </div>
      </section>
      <!-- Секция Gallery -->
      <section class="gallery section-common" id="gallery">
        <h2 class="text-align">GALLERY</h2>
      </section>
      <!-- Секция Testimonials -->
      <section class="testimonials section-decorated-light section-decorated-dark" id="testimonials"></section>
      <!-- Секция Partners -->
      <section class="partners section-common" id="partners">
        <h2 class="text-align">They have played with us</h2>
      </section>
      <!-- Секция Form -->
      <section class="form section-common" id="form"></section>
    </main>
    <footer class="footer section-decorated-light"></footer>

    <script type="module" src="../js/main.js"></script>
  </body>
</html>
