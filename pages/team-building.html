<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team building</title>
    <!-- Фавиконки -->
    <link rel="icon" type="image/svg+xml" href="../assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="../assets/favicon/favicon.ico" />

    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <header id="header" class="header"></header>
    <main>
      <!-- Секция Hero -->
      <section class="hero section-decorated-dark" id="hero"></section>
      <!-- Секция Experience -->
      <section class="experience section-common" id="experience">
        <h2 class="text-align">What your team gains:</h2>
      </section>
      <!-- Секция Stats -->
      <section class="stats decorated-dark-stats decorated-light-stats" id="stats"></section>
      <!-- Секция Quests -->
      <section class="quests section-special" id="quests">
        <h2 class="text-align">Explore our unique quests</h2>
      </section>
      <!-- Секция Gallery -->
      <section class="gallery section-common" id="gallery">
        <h2 class="text-align">GALLERY</h2>
      </section>
      <!-- Секция Testimonials -->
      <section class="testimonials section-decorated-light section-decorated-dark" id="testimonials">
        <h2 class="text-align">Experience that matters</h2>
      </section>
      <!-- Секция Benefits -->
      <section class="benefits section-common" id="benefits">
        <h2 class="text-align">WHY us?</h2>
      </section>
      <!-- Секция quote как CTA -->
      <section class="quote-tb section-common section-decorated-light section-decorated-dark" id="quote"></section>
      <!-- Секция Form -->
      <section class="form section-common" id="form"></section>
      <!-- Секция FAQ -->
      <section class="faq section-common" id="faq">
        <h2 class="container text-align">FAQ</h2>
      </section>
    </main>
    <footer class="footer section-common section-decorated-light"></footer>

    <script type="module" src="../js/main.js"></script>
</body>
</html>
